name: 每日結算輪詢

# 跨過台北午夜後敲結算端點，結算「前一日」（表單開放編輯至當日 24:00）。
# UTC 16:00–19:45 = 台北 00:00–03:45；結算冪等，多敲幾次無妨。
on:
  schedule:
    # 每 15 分鐘一班（UTC 16:00–19:45 = 台北 00:00–03:45）
    - cron: '*/15 16-19 * * *'
  workflow_dispatch: {} # 允許手動觸發

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: 呼叫結算端點
        run: |
          curl -sS -m 90 "https://smart-5s-inspection.vercel.app/api/cron/settle" || true
